# Hermes Agent MCP config fragment for the official uCoz MCP.
# Merge into ~/.hermes/config.yaml under mcp_servers.
mcp_servers:
  ucoz:
    command: npx
    args: ["-y", "ucoz-mcp@latest"]
    env:
      UCOZ_API_TOKEN: "${UCOZ_API_TOKEN}"
      UCOZ_SITE_URL: "${UCOZ_SITE_URL}"
      UCOZ_FTP_HOST: "${UCOZ_FTP_HOST}"
      UCOZ_FTP_USER: "${UCOZ_FTP_USER}"
      UCOZ_FTP_PASS: "${UCOZ_FTP_PASS}"
    timeout: 120
    connect_timeout: 60
